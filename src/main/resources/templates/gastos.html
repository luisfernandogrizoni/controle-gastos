<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Controle de Gastos</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 2rem 5rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        .form-gasto { margin-bottom: 2rem; padding: 1rem; background: #f4f4f4; border-radius: 8px;}
    </style>
</head>
<body>

<h1>💰 Controle de Gastos</h1>

<div class="form-gasto">
    <form th:action="@{/gastos}" th:object="${novoGasto}" method="post">
        <input type="text" th:field="*{descricao}" placeholder="Ex: Conta de Luz" required>
        <input type="number" step="0.01" th:field="*{valor}" placeholder="Valor (R$)" required>
        <input type="date" th:field="*{data}" required>
        <button type="submit">Adicionar Gasto</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>Descrição</th>
        <th>Valor</th>
        <th>Data</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody id="tabela-gastos">
    <tr th:each="gasto : ${gastos}" th:id="'gasto-' + ${gasto.id}">
        <td th:text="${gasto.descricao}"></td>
        <td th:text="${'R$ ' + gasto.valor}"></td>
        <td th:text="${#temporals.format(gasto.data, 'dd/MM/yyyy')}"></td>
        <td>
            <button th:attr="hx-delete=@{/gastos/{id}(id=${gasto.id})}, hx-target='#gasto-' + ${gasto.id}"
                    hx-swap="outerHTML"
                    style="color: red; cursor: pointer;">
                Excluir
            </button>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
